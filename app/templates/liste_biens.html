<h1>Liste des biens</h1>

<a href="/">Retour à l'acceuil</a><br><br>

<form method="GET" action="/biens/vue">
    <input type="text" name="ville" placeholder="Filtrer par ville">
    <button type="submit">Filtrer</button>
</form>

<ul>
    {% for bien in biens %}
    <li>
        <a href="/biens/{{ bien.id }}">
            {{ bien.nom }} - {{ bien.ville }}
        </a>
    </li>
    {% endfor %}
</ul>
