<h1>Détail du bien</h1>

<p><strong>Nom :</strong> {{ bien.nom }}</p>
<p><strong>Description :</strong> {{ bien.description }}</p>
<p><strong>Type :</strong> {{ bien.type_bien }}</p>
<p><strong>Ville :</strong> {{ bien.ville }}</p>

<h2>Pièces</h2>
<ul>
    {% for piece in bien.pieces %}
    <li>{{ piece.nom }} ({{ piece.surface }} m²)</li>
    {% endfor %}
</ul>

<a href="/biens/{{ bien.id }}/edit">Modifier</a>
