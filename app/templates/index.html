<h1>Immobilier API</h1>

{% if user %}
<p>Connecté : {{ user.prenom }} {{ user.nom }}</p>
<a href="/logout">Se déconnecter</a><br>
<a href="/users/{{ user.id }}">Mon profil</a><br>
{% else %}
<p>Non connecté</p>
<a href="/login">Se connecter</a><br>
<a href="/users/form">Créer un compte</a><br>
{% endif %}<br>

<a href="/biens/vue">Voir les biens</a>
